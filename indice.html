<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice - Menú Rock</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Segoe+UI&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* IMAGEN DE FONDO */
            background: linear-gradient(rgba(10, 10, 10, 0.85), rgba(0, 0, 0, 0.9)), url('2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .main-container {
            width: 95%;
            max-width: 700px;
            background: rgba(18, 18, 18, 0.95);
            border: 1px solid #333;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
        }

        h2 {
            font-family: 'Creepster', cursive;
            color: #ff3333;
            text-transform: uppercase;
            text-align: center;
            font-size: 2.8rem;
            margin-top: 0;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
        }

        .bienvenida {
            font-size: 1.1rem;
            color: #888;
            text-align: center;
            margin-bottom: 30px;
            font-style: italic;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn-menu {
            background-color: rgba(26, 26, 26, 0.8);
            color: #fff;
            border: 1px solid #444;
            padding: 25px 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-menu:hover {
            background-color: #000;
            border-color: #ff3333;
            color: #ff3333;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
            transform: scale(1.02);
        }

        .btn-salir {
            background-color: #ff3333;
            color: #000;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            align-self: center;
            padding-left: 40px;
            padding-right: 40px;
            transition: all 0.2s;
        }

        .btn-salir:hover {
            background-color: #fff;
            color: #000;
        }

        @media (max-width: 600px) {
            .menu-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .btn-menu { padding: 20px 10px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h2>Setlist de Temas</h2>
        <div id="saludo" class="bienvenida">Cargando sesión...</div>

        <div class="menu-grid">
            <button class="btn-menu" onclick="window.location.href='definicion.html'">
                01. Concepto
            </button>
            <button class="btn-menu" onclick="window.location.href='cambios.html'">
                02. Adolescencia
            </button>
            <button class="btn-menu" onclick="window.location.href='gestion.html'">
                03. Gestión
            </button>
            <button class="btn-menu" onclick="window.location.href='test.html'">
                04. Test
            </button>
        </div>

        <button class="btn-salir" onclick="cerrarSesion()">
            Salir del Set
        </button>
    </div>

    <script>
        window.onload = function() {
            var nombre = localStorage.getItem('usuario_nombre');
            if (nombre) {
                document.getElementById('saludo').innerText = "Iniciado como: " + nombre + ". Selecciona una pista.";
            }
        };

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
