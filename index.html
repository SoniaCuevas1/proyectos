<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portada - Proyecto Emociones</title>
    <style>
        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background: linear-gradient(135deg, #0f0c20 0%, #151015 50%, #000000 100%);
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 90%;
            max-width: 800px;
            background: rgba(20, 20, 25, 0.85);
            border: 2px solid #ff3333;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.3);
            border-radius: 4px;
            padding: 40px 20px;
            text-align: center;
            box-sizing: border-box;
            margin: 20px;
        }

        .header-title {
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .titulo-proyecto {
            font-size: 3rem;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
            text-transform: uppercase;
            margin: 10px 0 30px 0;
        }

        .imagen-portada {
            width: 100%;
            max-width: 400px;
            height: auto;
            border: 3px solid #e0e0e0;
            box-shadow: 5px 5px 0px #ff3333;
            margin-bottom: 30px;
            filter: grayscale(30%) contrast(120%);
        }

        .descripcion-proyecto {
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.2rem;
            color: #b0b0b0;
            max-width: 600px;
            margin: 0 auto 40px auto;
            line-height: 1.6;
        }

        .btn-ingresar {
            background-color: transparent;
            color: #ff3333;
            border: 2px solid #ff3333;
            padding: 15px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.2);
        }

        .btn-ingresar:hover {
            background-color: #ff3333;
            color: #000000;
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.8);
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .titulo-proyecto { font-size: 2rem; }
            .descripcion-proyecto { font-size: 1rem; }
            .btn-ingresar { width: 100%; padding: 15px 0; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-title">Proyecto Emociones</div>
        <h1 class="titulo-proyecto">Las Emociones en la Adolescencia</h1>
        
        <img class="imagen-portada" src="ci.jpeg" alt="Portada Rock">

        <p class="descripcion-proyecto">
            Una investigación sin censura sobre el caos, la intensidad y el desarrollo socioemocional en la etapa más crítica de la vida.
        </p>

        <button class="btn-ingresar" onclick="irAlRegistro()">
            Entrar al Caos
        </button>
    </div>

    <script>
        function irAlRegistro() {
            window.location.href = "registro.html";
        }
    </script>
</body>
</html>
