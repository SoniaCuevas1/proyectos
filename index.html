<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portada - Proyecto Emociones</title>
    <!-- Cargamos una fuente estilo Chiller/Terror desde Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Metal+Mania&family=Segoe+UI&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* IMAGEN DE FONDO: Cambia 'fondo.jpg' por el nombre de tu archivo */
            background: linear-gradient(rgba(10, 10, 10, 0.85), rgba(0, 0, 0, 0.9)), url('2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
        }

        .main-container {
            width: 90%;
            max-width: 800px;
            background: rgba(15, 15, 18, 0.9);
            border: 2px solid #ff3333;
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.4);
            border-radius: 4px;
            padding: 40px 20px;
            text-align: center;
            box-sizing: border-box;
            margin: 20px;
        }

        .header-title {
            font-family: 'Metal Mania', display;
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* Contenedor del título con el estilo distorsionado tipo Chiller */
        .titulo-contenedor {
            min-height: 80px; /* Evita que el diseño salte mientras se escribe */
            margin: 10px 0 30px 0;
        }

        .titulo-proyecto {
            font-family: 'Creepster', cursive;
            font-size: 3.5rem;
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.7);
            text-transform: uppercase;
            margin: 0;
            display: inline-block;
            border-right: 3px solid #ff3333; /* El cursor que parpadea */
            white-space: normal;
            animation: parpadeo-cursor 0.7s step-end infinite;
        }

        .imagen-portada {
            width: 100%;
            max-width: 400px;
            height: auto;
            border: 3px solid #e0e0e0;
            box-shadow: 5px 5px 0px #ff3333;
            margin-bottom: 30px;
            filter: grayscale(30%) contrast(120%);
        }

        .descripcion-proyecto {
            font-size: 1.2rem;
            color: #b0b0b0;
            max-width: 600px;
            margin: 0 auto 40px auto;
            line-height: 1.6;
        }

        .btn-ingresar {
            background-color: transparent;
            color: #ff3333;
            border: 2px solid #ff3333;
            padding: 15px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.2);
        }

        .btn-ingresar:hover {
            background-color: #ff3333;
            color: #000000;
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.8);
            transform: translateY(-2px);
        }

        /* Animación del cursor mecánico parpadeante */
        @keyframes parpadeo-cursor {
            from, to { border-color: transparent }
            50% { border-color: #ff3333; }
        }

        @media (max-width: 600px) {
            .titulo-proyecto { font-size: 2.2rem; }
            .descripcion-proyecto { font-size: 1rem; }
            .btn-ingresar { width: 100%; padding: 15px 0; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-title">Proyecto Emociones</div>
        
        <div class="titulo-contenedor">
            <h1 class="titulo-proyecto" id="efecto-escritura"></h1>
        </div>
        
        <img class="imagen-portada" src="ci.jpeg" alt="Portada Rock">

        <p class="descripcion-proyecto">
            Una investigación sin censura sobre el caos, la intensidad y el desarrollo socioemocional en la etapa más crítica de la vida.
        </p>

        <button class="btn-ingresar" onclick="irAlRegistro()">
            Entrar al Caos
        </button>
    </div>

    <script>
        // Configuración de la animación de escritura
        const textoOriginal = "Las Emociones en la Adolescencia";
        const elementoTitulo = document.getElementById("efecto-escritura");
        let indice = 0;

        function escribirTexto() {
            if (indice < textoOriginal.length) {
                elementoTitulo.innerHTML += textoOriginal.charAt(indice);
                indice++;
                setTimeout(escribirTexto, 100); // Velocidad en milisegundos por letra
            } else {
                // Cuando termina, quita el borde del cursor mecánico
                elementoTitulo.style.borderRight = "none";
            }
        }

        // Inicia el efecto cuando carga la página
        window.onload = function() {
            escribirTexto();
        };

        function irAlRegistro() {
            window.location.href = "registro.html";
        }
    </script>
</body>
</html>
