<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Proyecto Emociones</title>
    <!-- Fuente estilo terror/gótico -->
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Segoe+UI&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* IMAGEN DE FONDO */
            background: linear-gradient(rgba(10, 10, 10, 0.85), rgba(0, 0, 0, 0.9)), url('fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .main-container {
            width: 90%;
            max-width: 500px;
            background: rgba(22, 22, 26, 0.95);
            border-top: 4px solid #9c27b0;
            border-bottom: 4px solid #9c27b0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            padding: 40px 30px;
            box-sizing: border-box;
        }

        h2 {
            font-family: 'Creepster', cursive;
            color: #9c27b0;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.3rem;
            text-shadow: 0 0 10px rgba(156, 39, 176, 0.4);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .label-text {
            display: block;
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            background-color: #0d0d10;
            border: 1px solid #444;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .input-field:focus {
            border-color: #9c27b0;
            box-shadow: 0 0 10px rgba(156, 39, 176, 0.5);
            outline: none;
        }

        .btn-registrar {
            width: 100%;
            background-color: #9c27b0;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-registrar:hover {
            background-color: #b336cc;
            box-shadow: 0 0 15px rgba(156, 39, 176, 0.6);
        }

        .btn-regresar {
            width: 100%;
            background-color: transparent;
            color: #777;
            border: 1px solid #444;
            padding: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .btn-regresar:hover {
            color: #fff;
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h2>Identifícate</h2>

        <div class="form-group">
            <label class="label-text">Alias o Nombre:</label>
            <input type="text" id="nombre" class="input-field" placeholder="Tu nombre en el averno...">
        </div>

        <div class="form-group">
            <label class="label-text">Edad:</label>
            <input type="number" id="edad" class="input-field" placeholder="Años vividos">
        </div>

        <button class="btn-registrar" onclick="registrarUsuario()">
            Registrarse e Iniciar
        </button>

        <button class="btn-regresar" onclick="volverAPortada()">
            Volver
        </button>
    </div>

    <script>
        function registrarUsuario() {
            var nombre = document.getElementById('nombre').value;
            var edad = document.getElementById('edad').value;

            if (nombre.trim() === "" || edad.trim() === "") {
                alert("Completa los campos antes de cruzar la puerta.");
            } else {
                localStorage.setItem('usuario_nombre', nombre);
                localStorage.setItem('usuario_edad', edad);
                window.location.href = "indice.html";
            }
        }

        function volverAPortada() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
